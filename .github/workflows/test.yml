name: Run Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-py${{ matrix.python-version }}-pip-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pytest pytest-cov pytest-asyncio
        pip install jupyter_server>=2.0.1 langgraph>=0.0.1 python-dotenv>=0.19.0 deepagents>=0.1.0
        # JupyterLab is now a declared runtime dep (gh #24); install it so the
        # launcher guard test exercises the real "present" path.
        pip install "jupyterlab>=4.0,<5"
        # AG-UI is the wrapper's only streaming path (core 1.0), so [agui] pulls
        # ag-ui-langgraph[fastapi] + uvicorn — tests/test_agui_stream.py runs, not skips.
        # NOTE: this job installs a hand-listed dependency set rather than the
        # package's own (a plain `pip install -e .` would fire the jupyter-builder
        # hook and require Node here), so this floor must be kept in step with the
        # `langstage-core` floor in pyproject.toml — otherwise CI silently tests
        # against a core that predates a fix the package declares it needs, which
        # is exactly what happened on gh #78 (>=1.0.21 carries the TOML type
        # coercion). The `minimal-install` job is what exercises the declared deps.
        pip install "langstage-core[agui]>=1.0.21"
        pip install nbformat requests tornado traitlets jupyter_client

    - name: Add package to Python path
      run: |
        echo "PYTHONPATH=$PYTHONPATH:${{ github.workspace }}" >> $GITHUB_ENV

    - name: Verify package can be imported
      run: |
        python -c "import langstage_jupyter; print('✓ langstage_jupyter module found')"
        python -c "import langstage_jupyter.config; print('✓ config module found')"
        python -c "import langstage_jupyter.agent_wrapper; print('✓ agent_wrapper module found')"

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short --cov=langstage_jupyter --cov-report=term-missing --cov-report=xml

    - name: Upload coverage reports
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: false
        files: ./coverage.xml
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Guard against undeclared runtime dependencies: install the Python package
  # with NO extras (declared deps only, like a real `pip install langstage-jupyter`)
  # and smoke-import every module. A top-level import only available transitively
  # fails here. For this JupyterLab extension we first build the prebuilt
  # labextension (so the pip build hook's skip-if-exists skips the npm build at
  # install time), then install into an ISOLATED venv so the jupyterlab/Node
  # deps pulled in to run the build don't mask a missing declaration.
  minimal-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build the prebuilt labextension (lets the pip build hook skip npm)
        run: |
          python -m pip install --upgrade pip "jupyterlab>=4.0,<5"
          jlpm install --no-immutable
          jlpm build:prod
      - name: Clean-install with NO extras (declared deps only) + import smoke
        run: |
          python -m venv /tmp/mi
          /tmp/mi/bin/pip install --upgrade pip
          /tmp/mi/bin/pip install .
          /tmp/mi/bin/python -c "import langstage_jupyter; print('ok')"
          /tmp/mi/bin/python -c "import langstage_jupyter.config, langstage_jupyter.agent_wrapper, langstage_jupyter.handlers, langstage_jupyter.agent, langstage_jupyter.launcher; print('ok')"

  # gh #38/#48/#82 guard: the built wheel must bundle a labextension whose version
  # matches the wheel. The drift (skip-if-exists reusing a stale JS bundle) shipped
  # a mislabelled labextension THREE times. Note a clean CI checkout never has a
  # stale artifact to reuse, so building a fresh wheel here can only ever *pass* —
  # it does not reproduce the release-machine failure. So this job does two things:
  # it builds a wheel with the real release command (`uv build`) and runs the
  # pre-publish gate (scripts/check_labext_version.py), AND it positively proves
  # the in-build guard (hatch_build.py) *rejects* a stale bundle, which is the
  # condition that actually shipped.
  labext-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: astral-sh/setup-uv@v5
      - name: Build a release wheel with the real release command (fresh labextension)
        run: |
          python -m pip install --upgrade pip "jupyterlab>=4.0,<5"
          jlpm install --no-immutable
          jlpm build:prod
          uv build
      - name: Assert bundled labextension version == wheel version
        run: python scripts/check_labext_version.py
      - name: The in-build guard must REJECT a stale labextension (gh #82)
        run: |
          # Simulate the exact drift: make the already-built bundle's version lag
          # package.json (as a leftover previous-release build would), then assert
          # `uv build` refuses to package it instead of shipping it silently.
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("langstage_jupyter/labextension/package.json")
          d = json.loads(p.read_text()); d["version"] = "0.0.0-stale"
          p.write_text(json.dumps(d))
          PY
          if uv build --wheel; then
            echo "FAIL: build succeeded while packaging a stale labextension"; exit 1
          fi
          echo "ok: the in-build guard rejected the stale labextension"
