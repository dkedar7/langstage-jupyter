name: UI Tests (Galata)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JupyterLab
        run: |
          python -m pip install --upgrade pip
          pip install "jupyterlab>=4.0,<5"

      - name: Build + install the extension
        run: |
          # --no-immutable: CI is allowed to refresh the lockfile rather than
          # failing the build when it's slightly out of sync.
          jlpm install --no-immutable
          # Editable install runs the labextension build hook; runtime deps
          # (langgraph, langchain-core, langgraph-stream-parser, deepagents)
          # come with it — the stub agent needs no model/API key.
          pip install -e ".[dev]"
          jupyter labextension develop . --overwrite
          jupyter labextension list 2>&1 | grep -i deepagent

      - name: Install UI-test deps
        working-directory: ui-tests
        run: |
          jlpm install --no-immutable
          jlpm playwright install chromium --with-deps

      - name: Run Galata tests
        working-directory: ui-tests
        run: jlpm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deepagent-lab-playwright-report
          path: ui-tests/playwright-report/
          retention-days: 7
