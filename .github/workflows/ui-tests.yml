name: UI Tests (Galata)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JupyterLab
        run: |
          python -m pip install --upgrade pip
          pip install "jupyterlab>=4.0,<5"

      - name: Build + install the extension
        run: |
          # Mirrors the proven local install order (setup_and_install.sh):
          # build the prebuilt labextension first, then install + link.
          # --no-immutable lets CI refresh the lockfile instead of failing.
          jlpm install --no-immutable
          jlpm build:prod
          # Editable install brings the runtime deps (langgraph, langchain-core,
          # langgraph-stream-parser, deepagents) — the stub agent needs no key.
          pip install -e ".[dev]"
          jupyter server extension enable langstage_jupyter
          jupyter labextension develop . --overwrite
          jupyter labextension list 2>&1 | grep -i langstage

      - name: Install UI-test deps
        working-directory: ui-tests
        run: |
          jlpm install --no-immutable
          jlpm playwright install chromium --with-deps

      - name: Run Galata tests
        working-directory: ui-tests
        run: jlpm test

      # Lets us retrieve CI-generated visual baselines on the first run
      # (toHaveScreenshot writes them, then fails); commit them, and the gate
      # is live. Generated/checked in the same env, so renders match.
      - name: Upload Galata snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: galata-snapshots
          path: ui-tests/tests/**/*-snapshots/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: langstage-jupyter-playwright-report
          path: ui-tests/playwright-report/
          retention-days: 7
